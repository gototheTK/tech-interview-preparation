name: Notion to GitHub Sync

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 15 * * *' # 매일 한국 시간 자정(UTC 15시)에 자동 실행
  workflow_dispatch: # 버튼을 눌러서 수동으로도 실행 가능하게 함

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Notion To Markdown
        # 노션 데이터를 마크다운으로 바꿔주는 오픈소스 액션 사용
        uses: DoranWeo/notion-to-github-action@v1.0 
        with:
          notion_token: ${{ secrets.NOTION_TOKEN }}
          notion_database_id: ${{ secrets.NOTION_DATABASE_ID }}
          output_folder: 'docs' # 깃허브에 저장될 폴더 이름

      - name: Commit and Push changes
        run: |
          git config --global user.name 'gototkno1'
          git config --global user.email 'gototkno1@gmail.com'
          git add .
          # 변경사항이 있을 때만 커밋
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: 노션 Q&A 자동 동기화 완료"
          git push
