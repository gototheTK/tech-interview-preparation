name: Notion to GitHub Sync

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install @notionhq/client@2.2.15 notion-to-md@3.1.1

      - name: Fetch Notion Data and Save as Markdown
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          cat << 'EOF' > sync.js
          const { Client } = require("@notionhq/client");
          const { NotionToMarkdown } = require("notion-to-md");
          const fs = require("fs");
          const path = require("path");

          const notion = new Client({ auth: process.env.NOTION_TOKEN });
          const n2m = new NotionToMarkdown({ notionClient: notion });

          (async () => {
            try {
              const dbId = process.env.NOTION_DATABASE_ID;
              console.log("🔎 데이터베이스 조회를 시작합니다. ID:", dbId);
              
              const response = await notion.databases.query({ database_id: dbId });
              console.log(`📦 총 ${response.results.length}개의 페이지를 찾았습니다.`);

              const dir = path.join(process.cwd(), "docs");
              if (!fs.existsSync(dir)) fs.mkdirSync(dir);

              for (const page of response.results) {
                let title = page.id; 
                
                for (const key in page.properties) {
                  if (page.properties[key].type === "title") {
                    title = page.properties[key].title[0]?.plain_text || page.id;
                    break;
                  }
                }
                
                const safeTitle = title.replace(/[\/\\?%*:|"<>]/g, '-');
                console.log(`✍️ 마크다운 변환 중: ${safeTitle}`);
                
                const mdblocks = await n2m.pageToMarkdown(page.id);
                const mdString = n2m.toMarkdownString(mdblocks);
                
                // 🚨 [핵심 버그 수정 부분] 내용이 비어있든, 객체든 무조건 안전하게 문자열(String)로 추출!
                let content = "";
                if (typeof mdString === "string") {
                  content = mdString;
                } else if (typeof mdString === "object" && mdString !== null) {
                  content = mdString.parent || "";
                }
                
                fs.writeFileSync(path.join(dir, `${safeTitle}.md`), content);
                console.log(`✅ 저장 완료: docs/${safeTitle}.md`);
              }
              console.log("🎉 모든 작업이 성공적으로 끝났습니다!");
              
            } catch (error) {
              console.error("❌ 에러가 발생했습니다:", error);
              process.exit(1); 
            }
          })();
          EOF
          node sync.js

      - name: Commit and Push changes
        run: |
          git config --global user.name 'gototheTK'
          git config --global user.email 'gototkno1@gmail.com'
          git add docs/
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: 노션 Q&A 자동 동기화 완료"
          git push
